server:
  port: ${SERVER_PORT:9004}

spring:
  application:
    name: person-service
  datasource:
    # 抽取了数据库主机、端口、数据库名、用户名和密码
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/person_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        # 抽取了 Nacos 统一的服务器地址，并保留了你原本的账号密码占位符
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

file:
  # 统一规范为绝对路径 /app/uploads/...，方便 Docker 挂载，并提供 FILE_UPLOAD_FOLDER 变量
  upload-folder: ${FILE_UPLOAD_FOLDER:/app/uploads/persons/}
  # 抽取图片访问的前缀域名/IP，默认兜底为 http://localhost:9004
  access-prefix: ${FILE_ACCESS_HOST:http://localhost:9004}/uploads/persons/