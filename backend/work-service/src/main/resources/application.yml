server:
  port: ${SERVER_PORT:9002}

spring:
  application:
    name: work-service
  datasource:
    # 抽取了数据库主机、端口、数据库名、用户名和密码
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/work_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        # 抽取了 Nacos 地址、用户名和密码
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

file:
  # 上传目录在容器化时通常映射到宿主机，保持此默认值，必要时可通过环境变量覆盖
  upload-folder: ${FILE_UPLOAD_FOLDER:/app/uploads/works/}
  access-prefix: ${FILE_ACCESS_HOST:http://localhost:9002}/uploads/works/